<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKKUŞLAR SEYAHAT | TERMİNAL V71</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #CC0000; --bg: #0A0A0A; --card: #141414; --gold: #FFD700; --admin: #00CCFF; --yonetici: #AA00FF; }
        * { box-sizing: border-box; transition: 0.3s; font-family: 'Space Grotesk', sans-serif; }
        body { margin: 0; background: var(--bg); color: #EEE; display: flex; height: 100vh; overflow: hidden; }
        
        /* SOL MENÜ */
        .sidebar { width: 260px; background: #000; border-right: 2px solid var(--p); display: flex; flex-direction: column; padding: 20px; flex-shrink: 0; overflow-y: auto; }
        .logo-area { text-align: center; border-bottom: 2px solid var(--p); padding-bottom: 15px; margin-bottom: 20px; }
        .nav-btn { background: #111; color: #AAA; padding: 12px; margin-bottom: 6px; cursor: pointer; border: none; text-align: left; width: 100%; border-radius: 8px; font-weight: bold; font-size: 13px; display: flex; align-items: center; gap: 10px; }
        .nav-btn:hover, .active-btn { background: var(--p); color: white; }

        /* ANA EKRAN */
        .main { flex: 1; padding: 40px; overflow-y: auto; background: radial-gradient(circle at top right, #1a0000, #0A0A0A); }
        .panel { display: none; }
        .aktif { display: block !important; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #222; margin-bottom: 15px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; }
        .card img { width: 100%; border-radius: 8px; height: 160px; object-fit: cover; margin-bottom: 10px; border: 1px solid #333; }
        
        /* RÜTBELER */
        .badge { padding: 4px 10px; border-radius: 4px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .b-kurucu { background: var(--gold); color: #000; }
        .b-admin { background: var(--admin); color: #000; }
        .b-yonetici { background: var(--yonetici); color: #fff; }
        .b-uye { background: #444; color: #fff; }

        /* YETKİ KONTROLÜ */
        .kurucu-paneli, .editor-paneli { display: none; }
        .kurucu-mode .kurucu-paneli { display: block !important; }
        .kurucu-mode .editor-paneli, .admin-mode .editor-paneli, .yonetici-mode .editor-paneli { display: block !important; }
        .del-btn { background: #600; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 10px; display: none; margin-top: 10px; }
        .kurucu-mode .del-btn { display: inline-block !important; }

        input, select, textarea { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; margin-bottom: 10px; }
        .action-btn { background: var(--p); color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body id="app-body">

<div class="sidebar">
    <div class="logo-area">
        <h2 style="color:var(--p); margin:0;">AKKUŞLAR</h2>
        <small style="color:var(--gold)">👑 乂✯ҠƐꝈƐβƐҠ✯乂</small>
    </div>
    <button class="nav-btn active-btn" onclick="sayfa(1, this)">🏠 Ana Sayfa</button>
    <button class="nav-btn" onclick="sayfa(2, this)">👤 Ekip Kadrosu</button>
    <button class="nav-btn" onclick="sayfa(4, this)">📜 Ekip Kuralları</button>
    <button class="nav-btn" onclick="sayfa(8, this)">🖼️ Galeri</button>
    <button class="nav-btn" onclick="sayfa(7, this)">🛠️ Modlar</button>
    <button class="nav-btn" onclick="sayfa(11, this)">🎵 Müzikler</button>
    <button class="nav-btn" onclick="sayfa(5, this)">✍️ Ekibe Katıl</button>
    <button class="nav-btn" onclick="sayfa(3, this)">🎫 Bilet Al</button>
    <div style="margin-top:auto; padding-top:10px; border-top:1px solid #222;">
        <button class="nav-btn" style="color:var(--gold);" onclick="giris('kurucu')">👑 KURUCU GİRİŞİ</button>
        <button class="nav-btn" style="color:var(--admin);" onclick="giris('admin')">🛡️ ADMİN GİRİŞİ</button>
    </div>
</div>
